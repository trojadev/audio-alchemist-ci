name: Build and Test
##
on:
  push:
    branches:
      - '*'
    tags-ignore:
      - 'v[0-9]+.[0-9]+.[0-9]+'
    paths-ignore:
      - 'README.md'
  
  

jobs:
  build-workflow:
    uses: ./.github/workflows/build-image.yaml
    with:
      push_to_ghcr: false
      image_tag: ${{ github.ref_name }}
 